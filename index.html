<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OHCredits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <div class="toolbar-row">
          <button type="button" id="btn-toggle-json" class="btn primary" aria-expanded="false">
            Paste credits JSON
          </button>
          <button type="button" id="btn-preview" class="btn">Preview first slide</button>
          <button type="button" id="btn-play-both" class="btn primary">Play both</button>
          <button type="button" id="btn-play-169" class="btn">Play 16:9 only</button>
          <button type="button" id="btn-play-916" class="btn">Play 9:16 only</button>
          <button type="button" id="btn-stop" class="btn" disabled>Stop</button>
        </div>
        <div id="json-panel" class="json-panel hidden" hidden>
          <label for="json-input" class="json-label"
            >Paste JSON (episode + credits with role / people)</label
          >
          <textarea id="json-input" rows="12" spellcheck="false" placeholder='{"episode":{...},"credits":[...]}'></textarea>
          <div class="json-actions">
            <button type="button" id="btn-apply-json" class="btn primary">Apply JSON</button>
            <span id="json-status" class="json-status" role="status"></span>
          </div>
        </div>
      </header>

      <main class="workspace">
        <div class="workspace-grid">
          <section class="workspace-col" aria-labelledby="heading-169">
            <h2 id="heading-169" class="workspace-heading">16:9</h2>
            <div class="playout-shell">
              <div class="frame frame-16-9 playout-frame">
                <div class="frame-inner">
                  <div class="slide-layer">
                    <div id="slide-content-169" class="slide-content" aria-live="polite"></div>
                  </div>
                </div>
              </div>
            </div>
            <div id="page-strip-169" class="page-strip" data-aspect="169"></div>
            <button type="button" class="btn btn-add-page" data-aspect="169">Add page</button>
          </section>

          <section class="workspace-col" aria-labelledby="heading-916">
            <h2 id="heading-916" class="workspace-heading">9:16</h2>
            <div class="playout-shell playout-shell--916">
              <div class="frame frame-9-16 playout-frame">
                <div class="frame-inner">
                  <div class="slide-layer">
                    <div id="slide-content-916" class="slide-content" aria-live="polite"></div>
                  </div>
                </div>
              </div>
            </div>
            <div id="page-strip-916" class="page-strip" data-aspect="916"></div>
            <button type="button" class="btn btn-add-page" data-aspect="916">Add page</button>
          </section>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
