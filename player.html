<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Broadcast &hd=…; add &layout=169 when one 16×9 browser shows both (9×16 pillarboxed in tier canvas). -->
    <!-- Optional: instead of player-config.json, set Supabase URL + anon key for ?event=… -->
    <!-- <meta name="ohcredits-supabase-url" content="https://YOUR_REF.supabase.co" /> -->
    <!-- <meta name="ohcredits-supabase-anon-key" content="YOUR_ANON_KEY" /> -->
    <title>OHCredits player</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="player-body">
    <div class="player-broadcast-fit-root">
      <div class="player-broadcast-fit-inner">
        <div id="player-shell" class="player-shell player-shell--169">
          <div id="player-frame" class="frame frame-16-9 playout-frame">
            <div class="frame-inner">
              <div class="slide-layer">
                <div id="slide-content" class="slide-content" aria-live="polite"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="oh-engine.js"></script>
    <script src="player.js"></script>
  </body>
</html>
